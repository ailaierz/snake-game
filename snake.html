<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; justify-content: center; align-items: center;
  height: 100vh; background: #1a1a2e; font-family: Arial, sans-serif;
}
.game-wrapper { text-align: center; }
h1 { color: #eee; margin-bottom: 10px; font-size: 28px; }
.score { color: #e94560; font-size: 20px; margin-bottom: 10px; }
canvas { border: 2px solid #e94560; background: #16213e; display: block; margin: 0 auto; }
.controls { color: #888; margin-top: 10px; font-size: 14px; }
.restart { margin-top: 10px; padding: 8px 24px; background: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
.restart:hover { background: #c73652; }
</style>
</head>
<body>
<div class="game-wrapper">
  <h1>贪吃蛇</h1>
  <div class="score">分数: <span id="score">0</span></div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <button class="restart" onclick="restart()">重新开始</button>
  <div class="controls">使用 ↑ ↓ ← → 方向键控制</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const box = 20;
let snake = [{x: 10, y: 10}];
let food = spawnFood();
let direction = {x: 0, y: 0};
let score = 0;
let game;

function spawnFood() {
  return {
    x: Math.floor(Math.random() * 20),
    y: Math.floor(Math.random() * 20)
  };
}

document.addEventListener('keydown', e => {
  const key = e.key;
  if (key === 'ArrowUp' && direction.y === 0) direction = {x: 0, y: -1};
  if (key === 'ArrowDown' && direction.y === 0) direction = {x: 0, y: 1};
  if (key === 'ArrowLeft' && direction.x === 0) direction = {x: -1, y: 0};
  if (key === 'ArrowRight' && direction.x === 0) direction = {x: 1, y: 0};
});

function draw() {
  ctx.clearRect(0, 0, 400, 400);
  for (let i = 0; i < snake.length; i++) {
    ctx.fillStyle = i === 0 ? '#e94560' : '#0f3460';
    ctx.fillRect(snake[i].x * box, snake[i].y * box, box - 2, box - 2);
  }
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(food.x * box, food.y * box, box - 2, box - 2);
}

function update() {
  const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
  if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) return gameOver();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    food = spawnFood();
  } else {
    snake.pop();
  }
  draw();
}

function gameOver() {
  clearInterval(game);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, 400, 400);
  ctx.fillStyle = '#fff';
  ctx.font = '24px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('游戏结束! 分数: ' + score, 200, 200);
}

function restart() {
  clearInterval(game);
  snake = [{x: 10, y: 10}];
  direction = {x: 0, y: 0};
  score = 0;
  document.getElementById('score').textContent = '0';
  food = spawnFood();
  draw();
  game = setInterval(update, 120);
}

restart();
</script>
</body>
</html>
